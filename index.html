<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#146c94">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ToDo Board">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-180.png">
  <title>ToDo Board</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #62707b;
      --line: #d8dee3;
      --paper: #fbfcfd;
      --panel: #ffffff;
      --accent: #146c94;
      --accent-strong: #0e526f;
      --good: #2d7d46;
      --warn: #b76e00;
      --danger: #b23b3b;
      --shadow: 0 14px 34px rgba(20, 34, 44, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.94)),
        url("todo-bg.png") center / cover fixed;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: calc(28px + env(safe-area-inset-top)) 0 calc(32px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
      font-weight: 800;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(82px, 1fr));
      gap: 8px;
      min-width: 270px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 6px 16px rgba(20, 34, 44, 0.06);
    }

    .stat strong {
      display: block;
      font-size: 1.35rem;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(170px, 1fr) minmax(120px, 180px) minmax(120px, 160px) auto;
      gap: 10px;
      padding: 12px;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .field {
      min-width: 0;
    }

    .input,
    .select {
      width: 100%;
      min-height: 44px;
      border: 1px solid #cbd4db;
      border-radius: 7px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .input:focus,
    .select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(20, 108, 148, 0.16);
    }

    .primary {
      min-height: 44px;
      border: 0;
      border-radius: 7px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }

    .primary:hover {
      background: var(--accent-strong);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .column {
      min-height: 400px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 54px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .todo .dot { background: var(--warn); }
    .doing .dot { background: var(--accent); }
    .done .dot { background: var(--good); }

    .count {
      min-width: 30px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #eef2f5;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }

    .task-list {
      display: grid;
      gap: 10px;
      padding: 12px;
      min-height: 330px;
    }

    .task {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid #dce2e7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(20, 34, 44, 0.07);
    }

    .task-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-weight: 700;
      line-height: 1.35;
    }

    .task.done-card .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #eef5f3;
      color: #28534a;
      line-height: 1;
    }

    .priority {
      background: #f7eddf;
      color: #704807;
    }

    .actions {
      display: grid;
      grid-template-columns: 32px 32px 1fr 32px;
      gap: 6px;
      align-items: center;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid #d2dbe2;
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font-size: 1rem;
      line-height: 1;
    }

    .icon-button:hover {
      background: #f2f6f8;
      border-color: #b8c7d1;
    }

    .icon-button.delete {
      color: var(--danger);
    }

    .move-select {
      width: 100%;
      min-width: 0;
      height: 32px;
      border: 1px solid #d2dbe2;
      border-radius: 7px;
      background: #fff;
      padding: 0 8px;
      color: var(--ink);
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 110px;
      border: 1px dashed #cfd9e0;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      padding: 14px;
      font-size: 0.92rem;
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .ghost {
      min-height: 38px;
      border: 1px solid #cbd4db;
      border-radius: 7px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--muted);
    }

    .ghost:hover {
      color: var(--ink);
      background: #fff;
    }

    @media (max-width: 880px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .stats {
        min-width: 0;
      }

      .composer {
        grid-template-columns: 1fr 1fr;
      }

      .primary {
        grid-column: span 2;
      }

      .board {
        grid-template-columns: 1fr;
      }

      .column {
        min-height: 0;
      }
    }

    @media (max-width: 540px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      .composer,
      .stats {
        grid-template-columns: 1fr;
      }

      .primary {
        grid-column: auto;
      }

      .actions {
        grid-template-columns: 32px 32px 1fr 32px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>ToDo Board</h1>
        <p class="subtitle">今日やることを、軽く並べて進めるための小さなボード。</p>
      </div>
      <section class="stats" aria-label="タスク集計">
        <div class="stat"><strong id="totalCount">0</strong><span>タスク</span></div>
        <div class="stat"><strong id="activeCount">0</strong><span>進行中まで</span></div>
        <div class="stat"><strong id="doneCount">0</strong><span>完了</span></div>
      </section>
    </header>

    <form class="composer" id="taskForm">
      <label class="field">
        <span class="sr-only">タスク名</span>
        <input class="input" id="taskTitle" type="text" maxlength="90" placeholder="タスクを追加" autocomplete="off" required>
      </label>
      <label class="field">
        <span class="sr-only">カテゴリ</span>
        <input class="input" id="taskTag" type="text" maxlength="24" placeholder="カテゴリ">
      </label>
      <label class="field">
        <span class="sr-only">優先度</span>
        <select class="select" id="taskPriority">
          <option value="通常">通常</option>
          <option value="高め">高め</option>
          <option value="低め">低め</option>
        </select>
      </label>
      <button class="primary" type="submit">追加</button>
    </form>

    <section class="board" aria-label="ToDoボード">
      <article class="column todo" data-status="todo">
        <header class="column-header">
          <h2 class="column-title"><span class="dot"></span>未着手</h2>
          <span class="count" id="todoCount">0</span>
        </header>
        <div class="task-list" id="todoList"></div>
      </article>

      <article class="column doing" data-status="doing">
        <header class="column-header">
          <h2 class="column-title"><span class="dot"></span>進行中</h2>
          <span class="count" id="doingCount">0</span>
        </header>
        <div class="task-list" id="doingList"></div>
      </article>

      <article class="column done" data-status="done">
        <header class="column-header">
          <h2 class="column-title"><span class="dot"></span>完了</h2>
          <span class="count" id="doneColumnCount">0</span>
        </header>
        <div class="task-list" id="doneList"></div>
      </article>
    </section>

    <div class="footer-actions">
      <button class="ghost" id="resetButton" type="button">サンプルに戻す</button>
    </div>
  </main>

  <script>
    const storageKey = "codex-demo-todo-board";
    const columns = {
      todo: { label: "未着手", list: document.querySelector("#todoList"), count: document.querySelector("#todoCount") },
      doing: { label: "進行中", list: document.querySelector("#doingList"), count: document.querySelector("#doingCount") },
      done: { label: "完了", list: document.querySelector("#doneList"), count: document.querySelector("#doneColumnCount") }
    };

    const sampleTasks = [
      { id: crypto.randomUUID(), title: "今日の優先タスクを3つ決める", tag: "計画", priority: "通常", status: "todo", createdAt: Date.now() - 120000 },
      { id: crypto.randomUUID(), title: "資料のラフを作る", tag: "仕事", priority: "高め", status: "doing", createdAt: Date.now() - 80000 },
      { id: crypto.randomUUID(), title: "買い物リストを確認", tag: "生活", priority: "低め", status: "done", createdAt: Date.now() - 30000 }
    ];

    let tasks = loadTasks();

    function loadTasks() {
      const saved = localStorage.getItem(storageKey);
      if (!saved) return [...sampleTasks];
      try {
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [...sampleTasks];
      } catch {
        return [...sampleTasks];
      }
    }

    function saveTasks() {
      localStorage.setItem(storageKey, JSON.stringify(tasks));
    }

    function render() {
      Object.values(columns).forEach((column) => {
        column.list.innerHTML = "";
      });

      for (const task of tasks) {
        columns[task.status].list.appendChild(createTaskCard(task));
      }

      for (const [status, column] of Object.entries(columns)) {
        const amount = tasks.filter((task) => task.status === status).length;
        column.count.textContent = amount;
        if (amount === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = status === "done" ? "完了したタスクがここに入ります" : "ここにタスクを置けます";
          column.list.appendChild(empty);
        }
      }

      document.querySelector("#totalCount").textContent = tasks.length;
      document.querySelector("#activeCount").textContent = tasks.filter((task) => task.status !== "done").length;
      document.querySelector("#doneCount").textContent = tasks.filter((task) => task.status === "done").length;
    }

    function createTaskCard(task) {
      const card = document.createElement("article");
      card.className = `task ${task.status === "done" ? "done-card" : ""}`;

      const title = document.createElement("p");
      title.className = "task-title";
      title.textContent = task.title;

      const meta = document.createElement("div");
      meta.className = "task-meta";
      if (task.tag) {
        const tag = document.createElement("span");
        tag.className = "pill";
        tag.textContent = task.tag;
        meta.appendChild(tag);
      }
      const priority = document.createElement("span");
      priority.className = "pill priority";
      priority.textContent = task.priority;
      meta.appendChild(priority);

      const actions = document.createElement("div");
      actions.className = "actions";
      actions.appendChild(iconButton("←", "左へ移動", () => moveTask(task.id, -1), task.status === "todo"));
      actions.appendChild(iconButton("✓", "完了", () => updateTask(task.id, { status: "done" }), task.status === "done"));

      const select = document.createElement("select");
      select.className = "move-select";
      select.setAttribute("aria-label", "状態を変更");
      for (const [status, column] of Object.entries(columns)) {
        const option = document.createElement("option");
        option.value = status;
        option.textContent = column.label;
        option.selected = task.status === status;
        select.appendChild(option);
      }
      select.addEventListener("change", () => updateTask(task.id, { status: select.value }));
      actions.appendChild(select);
      actions.appendChild(iconButton("×", "削除", () => deleteTask(task.id), false, "delete"));

      card.append(title, meta, actions);
      return card;
    }

    function iconButton(label, title, onClick, disabled = false, extraClass = "") {
      const button = document.createElement("button");
      button.className = `icon-button ${extraClass}`.trim();
      button.type = "button";
      button.textContent = label;
      button.title = title;
      button.setAttribute("aria-label", title);
      button.disabled = disabled;
      button.addEventListener("click", onClick);
      return button;
    }

    function addTask(title, tag, priority) {
      tasks.unshift({
        id: crypto.randomUUID(),
        title,
        tag,
        priority,
        status: "todo",
        createdAt: Date.now()
      });
      saveTasks();
      render();
    }

    function updateTask(id, patch) {
      tasks = tasks.map((task) => task.id === id ? { ...task, ...patch } : task);
      saveTasks();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter((task) => task.id !== id);
      saveTasks();
      render();
    }

    function moveTask(id, direction) {
      const order = ["todo", "doing", "done"];
      const task = tasks.find((item) => item.id === id);
      if (!task) return;
      const current = order.indexOf(task.status);
      const next = order[Math.max(0, Math.min(order.length - 1, current + direction))];
      updateTask(id, { status: next });
    }

    document.querySelector("#taskForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const titleInput = document.querySelector("#taskTitle");
      const tagInput = document.querySelector("#taskTag");
      const priorityInput = document.querySelector("#taskPriority");
      const title = titleInput.value.trim();
      if (!title) return;
      addTask(title, tagInput.value.trim(), priorityInput.value);
      titleInput.value = "";
      tagInput.value = "";
      priorityInput.value = "通常";
      titleInput.focus();
    });

    document.querySelector("#resetButton").addEventListener("click", () => {
      tasks = sampleTasks.map((task) => ({ ...task, id: crypto.randomUUID(), createdAt: Date.now() }));
      saveTasks();
      render();
    });

    render();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
